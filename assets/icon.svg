<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E7490"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18"/>
      <feOffset dx="0" dy="12" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background with macOS-style corner radius -->
  <rect x="64" y="64" width="896" height="896" rx="200" ry="200" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="200" ry="200" fill="url(#glow)"/>

  <!-- Letter "G" — Poppins-inspired geometric -->
  <g filter="url(#shadow)">
    <path
      d="M 512 232
         C 360 232, 248 344, 248 496
         C 248 648, 360 760, 512 760
         C 612 760, 700 708, 748 628
         L 748 512
         L 544 512
         L 544 592
         L 648 592
         L 648 610
         C 620 652, 572 680, 512 680
         C 410 680, 328 598, 328 496
         C 328 394, 410 312, 512 312
         C 574 312, 628 342, 660 388
         L 724 332
         C 676 272, 600 232, 512 232 Z"
      fill="#FFFFFF"
    />
  </g>

  <!-- Small accent dot (like a period / bullet) -->
  <circle cx="760" cy="680" r="28" fill="#5EEAD4" opacity="0.9"/>
</svg>
